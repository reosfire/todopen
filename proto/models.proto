syntax = "proto3";

package todoonya;

// ───── Recurrence ─────

message ProtoDailyRecurrence {}

message ProtoEveryNDaysRecurrence {
  int32 interval = 1;
}

message ProtoWeeklyRecurrence {
  int32 weekdayBits = 1;
}

message ProtoMonthlyRecurrence {
  int32 day_of_month = 1;
}

message ProtoYearlyRecurrence {
  int32 month = 1;
  int32 day_of_month = 2;
}

message ProtoRecurrenceRule {
  oneof rule {
    ProtoDailyRecurrence daily = 1;
    ProtoEveryNDaysRecurrence every_n_days = 2;
    ProtoWeeklyRecurrence weekly = 3;
    ProtoMonthlyRecurrence monthly = 4;
    ProtoYearlyRecurrence yearly = 5;
  }
}

// ───── Task ─────

message ProtoTask {
  bytes id = 1;
  string title = 2;
  string notes = 3;
  bool is_completed = 4;
  int64 created_at_ms = 5;
  // 0 means "not set" for optional timestamps
  int64 scheduled_date_ms = 6;
  ProtoRecurrenceRule recurrence = 7;
  repeated bytes tag_ids = 8;
  bytes list_id = 9;
  // empty bytes means "not set"
  bytes previous_task_id = 10;
  bytes next_task_id = 11;
  repeated int64 completed_dates_ms = 12;
}

// ───── TaskList ─────

message ProtoTaskList {
  bytes id = 1;
  string name = 2;
  // color_value = 0 and has_color = false means no color
  bool has_color = 3;
  int32 color_value = 4;
  // empty bytes means "not set"
  bytes folder_id = 5;
  int32 order = 6;
}

// ───── Folder ─────

message ProtoFolder {
  bytes id = 1;
  string name = 2;
  int32 order = 3;
}

// ───── Tag ─────

message ProtoTag {
  bytes id = 1;
  string name = 2;
  int32 color_value = 3;
}

// ───── SmartList filter types ─────

message ProtoTodayFilter {}
message ProtoTomorrowFilter {}
message ProtoUpcomingFilter {}
message ProtoOverdueFilter {}
message ProtoCompletedFilter {}
message ProtoAllTasksFilter {}

message ProtoDateRangeFilter {
  bool has_date_from = 1;
  int64 date_from_ms = 2;
  bool has_date_to = 3;
  int64 date_to_ms = 4;
}

message ProtoTagsFilter {
  repeated bytes tag_ids = 1;
}

message ProtoSmartListFilter {
  oneof filter {
    ProtoTodayFilter today = 1;
    ProtoTomorrowFilter tomorrow = 2;
    ProtoUpcomingFilter upcoming = 3;
    ProtoOverdueFilter overdue = 4;
    ProtoDateRangeFilter date_range = 5;
    ProtoTagsFilter tags = 6;
    ProtoCompletedFilter completed = 7;
    ProtoAllTasksFilter all = 8;
  }
}

// ───── SmartList ─────

message ProtoSmartList {
  bytes id = 1;
  string name = 2;
  int32 icon_code_point = 3;
  int32 color_value = 4;
  ProtoSmartListFilter filter = 5;
}

// ───── SyncIndex ─────

message ProtoSyncIndex {
  // key (e.g. "tasks/abc-123") → last-modified timestamp in ms since epoch
  map<string, int64> entities = 1;
  // key → deletion timestamp in ms since epoch
  map<string, int64> deletions = 2;
}
