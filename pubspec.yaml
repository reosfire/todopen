name: todopen
description: "A todo app with Dropbox sync."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.4
  uuid: ^4.5.3
  http: ^1.6.0
  intl: ^0.20.2
  url_launcher: ^6.3.2
  crypto: ^3.0.6
  shared_preferences: ^2.3.4
  web: ^1.1.1
  app_links: ^6.3.4
  archive: ^4.0.7
  drift: ^2.32.0
  drift_flutter: ^0.3.0
  protobuf: ^6.0.0
  fixnum: ^1.1.1
  flutter_markdown_plus: ^1.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  drift_dev: ^2.32.0
  build_runner: ^2.11.1
  build: any
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: true
  web:
    generate: true
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21
